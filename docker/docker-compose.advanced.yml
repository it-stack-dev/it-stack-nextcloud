# Lab 03 — Advanced Features: nextcloud with TLS, resource limits, logging
---
services:
  nextcloud:
    image: nextcloud:28-apache
    container_name: it-stack-nextcloud
    restart: unless-stopped
    ports:
      - "80:$firstPort"
    environment:
      - IT_STACK_ENV=lab-03-advanced
      - TLS_ENABLED=true
    volumes:
      - nextcloud_data:/var/lib/nextcloud
      - ./certs:/etc/ssl/certs:ro
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: G
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    networks:
      - it-stack-net

networks:
  it-stack-net:
    driver: bridge

volumes:
  nextcloud_data:
