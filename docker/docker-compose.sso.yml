# docker-compose.sso.yml — Lab 06-04: SSO Integration
# Nextcloud with Keycloak OIDC authentication (user_oidc app)
name: nextcloud-sso

x-nc-env: &nc-env
  POSTGRES_HOST: db
  POSTGRES_DB: nextcloud
  POSTGRES_USER: ncuser
  POSTGRES_PASSWORD: Lab04Password!
  REDIS_HOST: redis
  REDIS_HOST_PASSWORD: Lab04Redis!
  NEXTCLOUD_ADMIN_USER: admin
  NEXTCLOUD_ADMIN_PASSWORD: Lab04Admin!
  NEXTCLOUD_TRUSTED_DOMAINS: "localhost"
  NEXTCLOUD_TRUSTED_PROXIES: "172.16.0.0/12 10.0.0.0/8"
  PHP_MEMORY_LIMIT: 512M
  PHP_UPLOAD_LIMIT: 512M
  NC_oidc_login_provider_url: "http://keycloak:8080/realms/it-stack"
  NC_oidc_login_client_id: "nextcloud"
  NC_oidc_login_client_secret: "nextcloud-secret-04"
  NC_oidc_login_auto_redirect: "false"
  NC_oidc_login_end_session_redirect: "true"
  NC_oidc_login_button_text: "Login with Keycloak"
  NC_oidc_login_use_id_token: "true"
  NC_oidc_login_attribute_email: "email"
  NC_oidc_login_attribute_displayName: "name"

services:
  db:
    image: postgres:16-alpine
    container_name: nc-sso-db
    environment:
      POSTGRES_DB: nextcloud
      POSTGRES_USER: ncuser
      POSTGRES_PASSWORD: Lab04Password!
    volumes:
      - nc_sso_db:/var/lib/postgresql/data
    networks:
      - nc-db-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ncuser -d nextcloud"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: nc-sso-redis
    command: redis-server --requirepass Lab04Redis! --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
    networks:
      - nc-app-net
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 320M
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: nc-sso-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: Lab04Admin!
      KC_HTTP_PORT: "8080"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_PROXY: edge
    ports:
      - "8084:8080"
    networks:
      - nc-app-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready | grep -q UP"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
    restart: unless-stopped

  nextcloud:
    image: nextcloud:29-apache
    container_name: nc-sso-app
    ports:
      - "8080:80"
    environment:
      <<: *nc-env
    volumes:
      - nc_sso_data:/var/www/html
    networks:
      - nc-app-net
      - nc-db-net
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/status.php | grep -q '\"installed\":true'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    restart: unless-stopped

  cron:
    image: nextcloud:29-apache
    container_name: nc-sso-cron
    entrypoint: /cron.sh
    environment:
      <<: *nc-env
    volumes:
      - nc_sso_data:/var/www/html
    networks:
      - nc-app-net
      - nc-db-net
    depends_on:
      - nextcloud
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    restart: unless-stopped

volumes:
  nc_sso_db:
  nc_sso_data:

networks:
  nc-app-net:
  nc-db-net: