# it-stack-nextcloud.yml — IT-Stack Module Manifest
# Module 06: Nextcloud file sync, calendar, and office suite

module:
  name: nextcloud
  number: "06"
  repo: it-stack-dev/it-stack-nextcloud
  version: "0.1.0"
  phase: 2
  category: collaboration
  server: lab-app1
  description: "Nextcloud file sync, calendar, and office suite"

upstream:
  name: Nextcloud
  image: nextcloud:28-apache
  license: AGPL-3.0

ports:
  - 80 (HTTP)
   - 443 (HTTPS)

labs:
  - id: "06-01"
    name: Standalone
    docker_compose: docker/docker-compose.standalone.yml
    test_script: tests/labs/test-lab-06-01.sh
  - id: "06-02"
    name: External Dependencies
    docker_compose: docker/docker-compose.lan.yml
    test_script: tests/labs/test-lab-06-02.sh
  - id: "06-03"
    name: Advanced Features
    docker_compose: docker/docker-compose.advanced.yml
    test_script: tests/labs/test-lab-06-03.sh
  - id: "06-04"
    name: SSO Integration
    docker_compose: docker/docker-compose.sso.yml
    test_script: tests/labs/test-lab-06-04.sh
  - id: "06-05"
    name: Advanced Integration
    docker_compose: docker/docker-compose.integration.yml
    test_script: tests/labs/test-lab-06-05.sh
  - id: "06-06"
    name: Production Deployment
    docker_compose: docker/docker-compose.production.yml
    test_script: tests/labs/test-lab-06-06.sh

resources:
  cpu_cores: 2
  ram_gb: 4
  disk_gb: 20

health_check:
  endpoint: /health
  metrics_endpoint: /metrics
  log_path: /var/log/nextcloud/
